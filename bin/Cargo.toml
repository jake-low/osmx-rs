[package]
name = "osmx-rs"
description = "Command-line tool for manipulating .osmx files"
version = "0.2.0"
edition = "2021" 

[dependencies]
anyhow = "1.0.102"
bincode = "1.3.3"
capnp = "0.20.3"
chrono = "0.4.38"
clap = { version = "4.5.2", features = ["derive", "cargo"] }
genawaiter = "0.99.1"
indicatif = "0.17.8"
libxml = "0.3.3"
lmdb = "0.8.0"
lmdb-sys = "0.8.0"
osmpbf = "0.3.4"
osmx = { path = ".." }
s2 = "0.0.12"
serde = { version = "1.0.197", features = ["derive"] }

[dev-dependencies]
tempfile = "3.10.0"

[[test]]
name = "adiff"
path = "tests/adiff/mod.rs"
